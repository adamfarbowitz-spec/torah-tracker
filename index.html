<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Torah">
<meta name="theme-color" content="#1D9E75">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Torah Tracker</title>
<style>
:root{--green:#1D9E75;--green-light:#E1F5EE;--green-mid:#5DCAA5;--green-dark:#085041;--green-deep:#0F6E56;--amber:#BA7517;--amber-light:#FAEEDA;--bg:#f8f8f6;--card:#ffffff;--text:#1a1a18;--text2:#666660;--text3:#999990;--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.06);--radius:16px;--radius-sm:10px;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
@media(prefers-color-scheme:dark){:root{--bg:#111110;--card:#1e1e1c;--text:#f0f0ec;--text2:#999990;--text3:#666660;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.06);--green-light:#0d2e22;--amber-light:#2a1e08}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto}
.topbar{padding:calc(var(--safe-top) + 14px) 20px 12px;background:var(--card);border-bottom:.5px solid var(--border2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h1{font-size:20px;font-weight:600;color:var(--text)}
.date-lbl{font-size:12px;color:var(--text2);margin-top:1px}
.catch-up-btn{background:var(--bg);border:.5px solid var(--border);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer}
.tabbar{display:flex;background:var(--card);border-top:.5px solid var(--border2);padding-bottom:var(--safe-bot);flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;cursor:pointer;gap:3px;border:none;background:none;color:var(--text3);font-size:10px;font-weight:500;transition:color .15s}
.tab.active{color:var(--green)}
.tab svg{width:22px;height:22px}
.page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;display:none}
.page.active{display:block}
.streak-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.streak-card{background:var(--card);border-radius:var(--radius-sm);padding:10px 6px;text-align:center;border:.5px solid var(--border2)}
.streak-card .s-num{font-size:22px;font-weight:600;color:var(--text)}
.streak-card .s-lbl{font-size:10px;color:var(--text2);margin-top:2px}
.streak-card.on-fire .s-num{color:var(--green)}
.item-card{background:var(--card);border:.5px solid var(--border2);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;transition:border-color .2s,background .2s}
.item-card.done{border-color:var(--green-mid);background:var(--green-light)}
.item-top{display:flex;align-items:center;gap:12px}
.check-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:15px}
.item-card.done .check-btn{background:var(--green);border-color:var(--green);color:#fff}
.item-info{flex:1;min-width:0}
.item-name{font-size:15px;font-weight:600;color:var(--text)}
.item-card.done .item-name{color:var(--green-dark)}
.item-sub{font-size:12px;color:var(--text2);margin-top:2px}
.item-card.done .item-sub{color:var(--green-deep)}
.prog-wrap{margin-top:10px;height:3px;background:var(--border2);border-radius:2px;overflow:hidden}
.prog-bar{height:100%;background:var(--green);border-radius:2px;transition:width .4s}
.notes-toggle{background:none;border:none;font-size:12px;color:var(--text3);cursor:pointer;padding:8px 0 2px;display:flex;align-items:center;gap:5px}
.item-card.done .notes-toggle{color:var(--green-deep)}
textarea.note{width:100%;margin-top:6px;padding:8px 10px;font-size:13px;font-family:inherit;border:.5px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--text);resize:none;line-height:1.5}
.item-card.done textarea.note{border-color:var(--green-mid)}
textarea.note:focus{outline:none;border-color:var(--green)}
.hidden{display:none!important}
.mussar-row{display:flex;align-items:center;gap:10px;margin-top:10px;padding-top:10px;border-top:.5px solid var(--border2)}
.item-card.done .mussar-row{border-top-color:var(--green-mid)}
.adj-btn{width:30px;height:30px;border-radius:50%;border:.5px solid var(--border);background:var(--bg);cursor:pointer;font-size:18px;font-weight:400;color:var(--text);display:flex;align-items:center;justify-content:center}
.time-val{font-size:14px;font-weight:600;min-width:50px;text-align:center;color:var(--text)}
.time-of{font-size:12px;color:var(--text2)}
.save-btn{width:100%;margin-top:8px;padding:14px;border-radius:var(--radius-sm);border:none;background:var(--green);font-size:16px;font-weight:600;color:#fff;cursor:pointer;transition:opacity .15s}
.save-btn:active{opacity:.85}
.save-btn.saved{background:var(--green-dark)}
.week-header{font-size:18px;font-weight:600;margin-bottom:12px}
.week-day{background:var(--card);border:.5px solid var(--border2);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.week-day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.week-day-name{font-size:14px;font-weight:600;color:var(--text)}
.week-day-date{font-size:12px;color:var(--text2)}
.week-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.chip.done{background:var(--green-light);color:var(--green-dark)}
.chip.miss{background:var(--bg);color:var(--text3);border:.5px solid var(--border2)}
.week-note{font-size:12px;color:var(--text2);margin-top:8px;font-style:italic;border-top:.5px solid var(--border2);padding-top:8px}
.heatmap-title{font-size:18px;font-weight:600;margin-bottom:4px}
.heatmap-sub{font-size:13px;color:var(--text2);margin-bottom:16px}
.heatmap-section{margin-bottom:20px}
.heatmap-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}
.heatmap-grid{display:grid;grid-template-columns:repeat(13,1fr);gap:4px}
.hm-cell{aspect-ratio:1;border-radius:3px;cursor:default}
.hm-0{background:var(--border2)}
.hm-1{background:#9FE1CB}
.hm-2{background:var(--green)}
.hm-legend{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:11px;color:var(--text2)}
.hm-legend .hm-cell{width:12px;height:12px;flex-shrink:0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding-bottom:var(--safe-bot)}
.modal-overlay.hidden{display:none}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + var(--safe-bot));width:100%;max-width:430px}
.modal h2{font-size:17px;font-weight:600;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:16px}
.date-picker-row{display:flex;gap:8px;margin-bottom:16px}
.date-btn{flex:1;padding:10px;border-radius:var(--radius-sm);border:.5px solid var(--border);background:var(--bg);font-size:13px;font-weight:500;color:var(--text);cursor:pointer;text-align:center;transition:all .15s}
.date-btn.selected{border-color:var(--green);background:var(--green-light);color:var(--green-dark)}
.modal-items{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.modal-item{display:flex;align-items:center;gap:10px}
.modal-item label{font-size:14px;color:var(--text);flex:1}
.modal-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.modal-check.on{background:var(--green);border-color:var(--green);color:#fff}
.modal-btns{display:flex;gap:10px}
.modal-cancel{flex:1;padding:12px;border-radius:var(--radius-sm);border:.5px solid var(--border);background:var(--bg);font-size:15px;font-weight:500;color:var(--text);cursor:pointer}
.modal-save{flex:2;padding:12px;border-radius:var(--radius-sm);border:none;background:var(--green);font-size:15px;font-weight:600;color:#fff;cursor:pointer}
.siyum-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px}
.siyum-overlay.hidden{display:none}
.siyum-box{background:var(--card);border-radius:24px;padding:32px 24px;text-align:center;max-width:320px;width:100%}
.siyum-emoji{font-size:52px;margin-bottom:12px}
.siyum-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px}
.siyum-sub{font-size:14px;color:var(--text2);line-height:1.5;margin-bottom:20px}
.siyum-close{width:100%;padding:14px;border-radius:var(--radius-sm);border:none;background:var(--green);font-size:16px;font-weight:600;color:#fff;cursor:pointer}
.install-banner{background:var(--amber-light);border:.5px solid var(--amber);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--amber);display:flex;align-items:center;gap:8px}
.install-banner button{background:none;border:none;font-size:16px;cursor:pointer;margin-left:auto;color:var(--amber)}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div>
      <div style="font-size:20px;font-weight:600" id="topbar-title">Daily Learning</div>
      <div class="date-lbl" id="topbar-date"></div>
    </div>
    <button class="catch-up-btn" onclick="openCatchUp()">+ Past day</button>
  </div>
  <div class="page active" id="page-today">
    <div id="install-banner" class="install-banner hidden">
      📲 Tap Share → "Add to Home Screen" to install
      <button onclick="document.getElementById('install-banner').classList.add('hidden')">✕</button>
    </div>
    <div class="streak-grid" id="streak-grid"></div>
    <div class="item-card" id="card-mishna"><div class="item-top"><button class="check-btn" id="chk-mishna" onclick="toggle('mishna')"></button><div class="item-info"><div class="item-name">Mishna Yomi</div><div class="item-sub" id="sub-mishna"></div></div></div><div class="prog-wrap"><div class="prog-bar" id="prog-mishna" style="width:0%"></div></div><button class="notes-toggle" onclick="toggleNote('mishna')">✎ <span id="ntlbl-mishna">Add a note</span></button><textarea class="note hidden" id="note-mishna" rows="2" placeholder="What stood out today?" oninput="saveNote('mishna')"></textarea></div>
    <div class="item-card" id="card-nach"><div class="item-top"><button class="check-btn" id="chk-nach" onclick="toggle('nach')"></button><div class="item-info"><div class="item-name">Nach Yomi</div><div class="item-sub" id="sub-nach"></div></div></div><div class="prog-wrap"><div class="prog-bar" id="prog-nach" style="width:0%"></div></div><button class="notes-toggle" onclick="toggleNote('nach')">✎ <span id="ntlbl-nach">Add a note</span></button><textarea class="note hidden" id="note-nach" rows="2" placeholder="A thought from the perek..." oninput="saveNote('nach')"></textarea></div>
    <div class="item-card" id="card-mussar"><div class="item-top"><button class="check-btn" id="chk-mussar" onclick="toggleMussar()"></button><div class="item-info"><div class="item-name">Mussar</div><div class="item-sub">10 min goal</div></div></div><div class="mussar-row"><button class="adj-btn" onclick="adjMussar(-5)">−</button><div class="time-val" id="mussar-val">0 min</div><button class="adj-btn" onclick="adjMussar(5)">+</button><div class="time-of">of 10 min</div></div><div class="prog-wrap"><div class="prog-bar" id="prog-mussar" style="width:0%"></div></div><button class="notes-toggle" onclick="toggleNote('mussar')">✎ <span id="ntlbl-mussar">Add a note</span></button><textarea class="note hidden" id="note-mussar" rows="2" placeholder="A chizuk thought..." oninput="saveNote('mussar')"></textarea></div>
    <div class="item-card" id="card-bitachon"><div class="item-top"><button class="check-btn" id="chk-bitachon" onclick="toggle('bitachon')"></button><div class="item-info"><div class="item-name">Bitachon</div><div class="item-sub">Daily learning</div></div></div><button class="notes-toggle" onclick="toggleNote('bitachon')">✎ <span id="ntlbl-bitachon">Add a note</span></button><textarea class="note hidden" id="note-bitachon" rows="2" placeholder="A thought on bitachon..." oninput="saveNote('bitachon')"></textarea></div>
    <div class="item-card" id="card-shabbos"><div class="item-top"><button class="check-btn" id="chk-shabbos" onclick="toggle('shabbos')"></button><div class="item-info"><div class="item-name">Shabbos Halacha</div><div class="item-sub">Daily halacha</div></div></div><button class="notes-toggle" onclick="toggleNote('shabbos')">✎ <span id="ntlbl-shabbos">Add a note</span></button><textarea class="note hidden" id="note-shabbos" rows="2" placeholder="Which halacha did you learn?" oninput="saveNote('shabbos')"></textarea></div>
    <button class="save-btn" id="save-btn" onclick="saveDay()">Save today's learning</button>
  </div>
  <div class="page" id="page-week"><div class="week-header">This week</div><div id="week-content"></div></div>
  <div class="page" id="page-heatmap"><div class="heatmap-title">Streak map</div><div class="heatmap-sub">Last 91 days of learning</div><div id="heatmap-content"></div><div class="hm-legend"><div class="hm-cell hm-0"></div>None<div class="hm-cell hm-1" style="margin-left:8px"></div>Partial<div class="hm-cell hm-2" style="margin-left:8px"></div>Full</div></div>
  <div class="tabbar">
    <button class="tab active" id="tab-today" onclick="showPage('today')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Today</button>
    <button class="tab" id="tab-week" onclick="showPage('week')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/><path d="M9 12l2 2 4-4"/></svg>Week</button>
    <button class="tab" id="tab-heatmap" onclick="showPage('heatmap')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>History</button>
  </div>
</div>
<div class="modal-overlay hidden" id="catchup-overlay"><div class="modal"><h2>Log a past day</h2><div class="modal-sub">Which day do you want to update?</div><div class="date-picker-row" id="date-picker-row"></div><div class="modal-items" id="catchup-items"></div><div class="modal-btns"><button class="modal-cancel" onclick="closeCatchUp()">Cancel</button><button class="modal-save" onclick="saveCatchUp()">Save</button></div></div></div>
<div class="siyum-overlay hidden" id="siyum-overlay"><div class="siyum-box"><div class="siyum-emoji">🎉</div><div class="siyum-title" id="siyum-title">Mazal Tov!</div><div class="siyum-sub" id="siyum-sub"></div><button class="siyum-close" onclick="closeSiyum()">יישר כוח!</button></div></div>
<script>
const NACH=[{book:"Shmuel II",p:24},{book:"Melachim I",p:22},{book:"Melachim II",p:25},{book:"Yeshayah",p:66},{book:"Yirmiyah",p:52},{book:"Yechezkel",p:48},{book:"Hoshea",p:14},{book:"Yoel",p:4},{book:"Amos",p:9},{book:"Ovadiah",p:1},{book:"Yonah",p:4},{book:"Michah",p:7},{book:"Nachum",p:3},{book:"Chavakuk",p:3},{book:"Tzefaniah",p:3},{book:"Chaggai",p:2},{book:"Zechariah",p:14},{book:"Malachi",p:3},{book:"Tehillim",p:150},{book:"Mishlei",p:31},{book:"Iyov",p:42},{book:"Shir Hashirim",p:8},{book:"Rus",p:4},{book:"Eichah",p:5},{book:"Kohelet",p:12},{book:"Esther",p:10},{book:"Daniel",p:12},{book:"Ezra",p:10},{book:"Nechemiah",p:13},{book:"Divrei Hayamim I",p:29},{book:"Divrei Hayamim II",p:36}];
const MPM={"Berachos":9,"Peah":8,"Demai":7,"Kilayim":9,"Sheviis":10,"Terumas":11,"Maasros":5,"Maaser Sheni":5,"Challah":4,"Orlah":3,"Bikurim":4,"Shabbos":24,"Eruvin":10,"Pesachim":10,"Shekalim":8,"Yoma":8,"Sukkah":5,"Beitzah":5,"Rosh Hashana":4,"Taanis":4,"Megillah":4,"Moed Katan":3,"Chagigah":3,"Yevamos":16,"Kesubos":13,"Nedarim":11,"Nazir":9,"Sotah":9,"Gittin":9,"Kiddushin":4,"Bava Kamma":10,"Bava Metziah":10,"Bava Basra":10,"Sanhedrin":11,"Makkos":3,"Shevuos":8,"Eduyos":8,"Avodah Zarah":5,"Avos":6,"Horayos":3,"Zevachim":14,"Menachos":13,"Chulin":12,"Bechoros":9,"Erchin":9,"Temurah":7,"Kerisos":6,"Meilah":6,"Tamid":7,"Middos":5,"Kinnim":3,"Keilim":30,"Ohalos":18,"Negaim":14,"Parah":12,"Taharos":10,"Mikvaos":10,"Niddah":10,"Machshirin":6,"Zavim":5,"Tevul Yom":4,"Yadayim":4,"Uktzin":3};
const MO=["Berachos","Peah","Demai","Kilayim","Sheviis","Terumas","Maasros","Maaser Sheni","Challah","Orlah","Bikurim","Shabbos","Eruvin","Pesachim","Shekalim","Yoma","Sukkah","Beitzah","Rosh Hashana","Taanis","Megillah","Moed Katan","Chagigah","Yevamos","Kesubos","Nedarim","Nazir","Sotah","Gittin","Kiddushin","Bava Kamma","Bava Metziah","Bava Basra","Sanhedrin","Makkos","Shevuos","Eduyos","Avodah Zarah","Avos","Horayos","Zevachim","Menachos","Chulin","Bechoros","Erchin","Temurah","Kerisos","Meilah","Tamid","Middos","Kinnim","Keilim","Ohalos","Negaim","Parah","Taharos","Mikvaos","Niddah","Machshirin","Zavim","Tevul Yom","Yadayim","Uktzin"];
const ML=[];for(const m of MO)for(let i=1;i<=(MPM[m]||5);i++)ML.push({m,p:i});
const NT=NACH.reduce((s,b)=>s+b.p,0),MT=ML.length;
function getNach(o){let pos=(o*2)%NT,r=0;for(let i=0;i<NACH.length;i++){const b=NACH[i];if(pos<r+b.p){const p1=pos-r+1;let p2=p1+1,b2=b.book,nb=false;if(p2>b.p){const n=NACH[i+1];if(n){b2=n.book;p2=1;nb=true;}else p2=b.p;}return{label:nb?b.book+' '+p1+', '+b2+' 1':b.book+' '+p1+'–'+p2,progress:Math.round((r+p1-1)/NT*100),book:b.book,perek:p1};}r+=b.p;}}
function getMishna(o){const pos=(o*2)%MT,a=ML[pos],b=ML[(pos+1)%MT];return{label:a.m===b.m?a.m+' '+a.p+':1–'+b.p+':1':a.m+' '+a.p+':1, '+b.m+' '+b.p+':1',progress:Math.round(pos/MT*100),masechta:a.m,perek:a.p};}
const KEY='torah_pwa_v1';
let DB=JSON.parse(localStorage.getItem(KEY)||'{}');
function persist(){localStorage.setItem(KEY,JSON.stringify(DB));}
function getDay(k){if(!DB[k])DB[k]={mishna:false,nach:false,mussar:0,bitachon:false,shabbos:false,notes:{}};if(!DB[k].notes)DB[k].notes={};return DB[k];}
function todayKey(){const d=new Date();d.setHours(0,0,0,0);return d.toISOString().slice(0,10);}
function dayOffset(s){return Math.floor((new Date(s+'T00:00:00')-new Date('2025-01-01T00:00:00'))/86400000);}
const ITEMS=['mishna','nach','mussar','bitachon','shabbos'];
let lastSiyum=JSON.parse(localStorage.getItem('siyum_shown')||'{}');
function checkSiyum(key){const tk=todayKey(),off=dayOffset(tk),nach=getNach(off),m=getMishna(off);if(key==='nach'&&nach.perek===NACH.find(x=>x.book===nach.book).p){const sk='nach_'+nach.book+'_'+tk;if(!lastSiyum[sk]){lastSiyum[sk]=true;localStorage.setItem('siyum_shown',JSON.stringify(lastSiyum));showSiyum('Siyum on '+nach.book+'!','You completed Sefer '+nach.book+'. What an incredible achievement – may you go from strength to strength!');}}if(key==='mishna'){const pm=MPM[m.masechta]||5;if(m.perek===pm){const sk='mishna_'+m.masechta+'_'+tk;if(!lastSiyum[sk]){lastSiyum[sk]=true;localStorage.setItem('siyum_shown',JSON.stringify(lastSiyum));showSiyum('Siyum on Maseches '+m.masechta+'!','You completed Maseches '+m.masechta+'. Mazal tov – may you continue learning in good health!');}}}}
function showSiyum(t,s){document.getElementById('siyum-title').textContent=t;document.getElementById('siyum-sub').textContent=s;document.getElementById('siyum-overlay').classList.remove('hidden');}
function closeSiyum(){document.getElementById('siyum-overlay').classList.add('hidden');}
function renderToday(){const tk=todayKey(),off=dayOffset(tk),d=getDay(tk),nach=getNach(off),m=getMishna(off);
document.getElementById('topbar-date').textContent=new Date(tk+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
document.getElementById('sub-nach').textContent=nach.label;document.getElementById('sub-mishna').textContent=m.label;
document.getElementById('prog-nach').style.width=nach.progress+'%';document.getElementById('prog-mishna').style.width=m.progress+'%';
['mishna','nach','bitachon','shabbos'].forEach(k=>{const c=document.getElementById('card-'+k),h=document.getElementById('chk-'+k);if(d[k]){c.classList.add('done');h.textContent='✓';}else{c.classList.remove('done');h.textContent='';}updateNL(k,d.notes[k]);});
const mins=d.mussar,mc=document.getElementById('card-mussar'),mh=document.getElementById('chk-mussar');
document.getElementById('mussar-val').textContent=mins+' min';document.getElementById('prog-mussar').style.width=Math.min(100,mins*10)+'%';
if(mins>=10){mc.classList.add('done');mh.textContent='✓';}else{mc.classList.remove('done');mh.textContent='';}updateNL('mussar',d.notes['mussar']);
renderStreaks();}
function updateNL(k,n){const e=document.getElementById('ntlbl-'+k);if(e)e.textContent=(n&&n.trim())?'Edit note':'Add a note';}
function renderStreaks(){const tk=todayKey(),keys=['mishna','nach','mussar','bitachon'],labels=['Mishna','Nach','Mussar','Bitachon'];
document.getElementById('streak-grid').innerHTML=keys.map((k,i)=>{const s=getStreak(k,tk);return '<div class="streak-card'+(s>0?' on-fire':'')+'"><div style="font-size:16px">'+(s>0?'🔥':'○')+'</div><div class="s-num">'+s+'</div><div class="s-lbl">'+labels[i]+'</div></div>';}).join('');}
function getStreak(key,from){let s=0;const d=new Date(from+'T12:00:00');while(true){const k=d.toISOString().slice(0,10),v=DB[k];if(!v)break;const done=key==='mussar'?v.mussar>=10:v[key];if(!done)break;s++;d.setDate(d.getDate()-1);}return s;}
function toggle(key){const tk=todayKey(),d=getDay(tk);d[key]=!d[key];persist();renderToday();if(d[key])checkSiyum(key);}
function toggleMussar(){const tk=todayKey(),d=getDay(tk);d.mussar=d.mussar>=10?0:10;persist();renderToday();}
function adjMussar(delta){const tk=todayKey(),d=getDay(tk);d.mussar=Math.max(0,Math.min(60,d.mussar+delta));persist();renderToday();}
function toggleNote(key){const ta=document.getElementById('note-'+key),tk=todayKey(),d=getDay(tk);ta.classList.toggle('hidden');if(!ta.classList.contains('hidden')){ta.value=d.notes[key]||'';ta.focus();}}
function saveNote(key){const ta=document.getElementById('note-'+key),tk=todayKey(),d=getDay(tk);d.notes[key]=ta.value;persist();updateNL(key,ta.value);}
function saveDay(){persist();const btn=document.getElementById('save-btn');btn.textContent='✓ Saved';btn.classList.add('saved');setTimeout(()=>{btn.textContent="Save today's learning";btn.classList.remove('saved');},2000);}
function renderWeek(){const days=[],today=new Date();today.setHours(0,0,0,0);for(let i=6;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);days.push(d.toISOString().slice(0,10));}
const labels={mishna:'Mishna',nach:'Nach',mussar:'Mussar',bitachon:'Bitachon',shabbos:'Shabbos'};
document.getElementById('week-content').innerHTML=days.map(dk=>{const d=DB[dk],dn=new Date(dk+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'}),dt=new Date(dk+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}),isT=dk===todayKey();
const chips=ITEMS.map(k=>{const done=d?(k==='mussar'?d.mussar>=10:d[k]):false;return'<span class="chip '+(done?'done':'miss')+'">'+labels[k]+'</span>';}).join('');
const notes=d?ITEMS.map(k=>(d.notes||{})[k]).filter(Boolean):[];
const nh=notes.length?'<div class="week-note">"'+notes[0].slice(0,120)+(notes[0].length>120?'…':'')+'&quot;</div>':'';
return'<div class="week-day"><div class="week-day-header"><div class="week-day-name">'+dn+(isT?' · Today':'')+'</div><div class="week-day-date">'+dt+'</div></div><div class="week-chips">'+chips+'</div>'+nh+'</div>';}).join('');}
function renderHeatmap(){const today=new Date();today.setHours(0,0,0,0);const secs=[{label:'Mishna Yomi',key:'mishna'},{label:'Nach Yomi',key:'nach'},{label:'Mussar',key:'mussar'},{label:'Bitachon',key:'bitachon'}];
document.getElementById('heatmap-content').innerHTML=secs.map(sec=>{const cells=[];for(let i=90;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);const dk=d.toISOString().slice(0,10),val=DB[dk];let lv=0;if(val){const done=sec.key==='mussar'?val.mussar>=10:val[sec.key];if(done)lv=2;else if(sec.key==='mussar'&&val.mussar>0)lv=1;}cells.push('<div class="hm-cell hm-'+lv+'" title="'+dk+'"></div>');}return'<div class="heatmap-section"><div class="heatmap-label">'+sec.label+'</div><div class="heatmap-grid">'+cells.join('')+'</div></div>';}).join('');}
let catchupState={},catchupDate='';
function openCatchUp(){const today=new Date();today.setHours(0,0,0,0);const dates=[];for(let i=1;i<=7;i++){const d=new Date(today);d.setDate(d.getDate()-i);dates.push(d.toISOString().slice(0,10));}catchupDate=dates[0];catchupState={};
document.getElementById('date-picker-row').innerHTML=dates.slice(0,5).map(dk=>{const lbl=new Date(dk+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'numeric',day:'numeric'});return'<button class="date-btn'+(dk===catchupDate?' selected':'')+'" onclick="selectCatchupDate(''+dk+'')">'+lbl+'</button>';}).join('');
renderCatchupItems();document.getElementById('catchup-overlay').classList.remove('hidden');}
function selectCatchupDate(dk){catchupDate=dk;catchupState={};document.querySelectorAll('.date-btn').forEach(b=>b.classList.toggle('selected',b.textContent===new Date(dk+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'numeric',day:'numeric'})));renderCatchupItems();}
function renderCatchupItems(){const d=DB[catchupDate],labels={mishna:'Mishna Yomi',nach:'Nach Yomi',mussar:'Mussar (10 min)',bitachon:'Bitachon',shabbos:'Shabbos Halacha'};
document.getElementById('catchup-items').innerHTML=ITEMS.map(k=>{const cur=catchupState[k]!==undefined?catchupState[k]:(d?(k==='mussar'?d.mussar>=10:d[k]):false);return'<div class="modal-item"><label>'+labels[k]+'</label><div class="modal-check'+(cur?' on':'')+'" id="cu-'+k+'" onclick="toggleCatchup(''+k+'')">'+( cur?'✓':'')+'</div></div>';}).join('');}
function toggleCatchup(key){const d=DB[catchupDate],cur=catchupState[key]!==undefined?catchupState[key]:(d?(key==='mussar'?d.mussar>=10:d[key]):false);catchupState[key]=!cur;const el=document.getElementById('cu-'+key);el.classList.toggle('on',catchupState[key]);el.textContent=catchupState[key]?'✓':'';}
function saveCatchUp(){const d=getDay(catchupDate);ITEMS.forEach(k=>{if(catchupState[k]!==undefined){if(k==='mussar')d.mussar=catchupState[k]?10:0;else d[k]=catchupState[k];}});DB[catchupDate]=d;persist();closeCatchUp();renderToday();}
function closeCatchUp(){document.getElementById('catchup-overlay').classList.add('hidden');}
function showPage(name){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('page-'+name).classList.add('active');document.getElementById('tab-'+name).classList.add('active');if(name==='week')renderWeek();if(name==='heatmap')renderHeatmap();document.getElementById('topbar-title').textContent=name==='today'?'Daily Learning':name==='week'?'This Week':'Learning History';}
function checkInstall(){const s=window.navigator.standalone||window.matchMedia('(display-mode:standalone)').matches,dis=localStorage.getItem('install_dismissed');if(!s&&!dis)document.getElementById('install-banner').classList.remove('hidden');}
document.querySelector('#install-banner button').addEventListener('click',()=>localStorage.setItem('install_dismissed','1'));
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
renderToday();checkInstall();
</script>
</body>
</html>
